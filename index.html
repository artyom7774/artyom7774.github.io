<!DOCTYPE html>
<html>
    <head>
        <meta charset = "utf-8">
        <title>Game</title>

        <link rel = "stylesheet" href = "css\style.css">
        
        <link rel = "javascript" href = "js\player.js">
        <link rel = "javascript" href = "js\code.js">
    </head>

    <body>        
        <div class = "stats">
            <h3>Player stats: </h3>
            <h4 id = "player_health"></h4>
            <h4 id = "player_damage"></h4>
            <h4 id = "player_level"></h4>
        </div>

        <div class = "inventory">
            <h3>Inventory: </h3>
        </div>

        <script src="js/player.js"></script>
        <script src="js/code.js"></script>
        <script>
            document.getElementById("player_health").textContent = "Health: " + player.health + " / " + player.max_health;
            document.getElementById("player_damage").textContent = "Damage: " + player.damage;
            document.getElementById("player_level").textContent = "Level: " + player.level + " ("  + player.xp + " / " + player.max_xp + ")";
        </script>
    </body>
</html>
